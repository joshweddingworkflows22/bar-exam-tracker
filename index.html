<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Bar Exam Study Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/tabler-icons.min.css">
<style>
:root{
  --fn:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --r:8px;
  --s0:#f7f6f0;--s1:#fff;--s2:#fff;
  --bd:#e5e3da;--bds:#d8d5c9;--bda:#2a78d6;
  --ba:#e6f1fb;
  --tp:#1c1b17;--ts:#55524a;--tm:#928e80;
  --ta:#1a5aa8;--tg:#1a8f5e;--td:#c23d3c;--tw:#a8620f;
  --fa:#2a78d6;--fg:#1baf7a;--fr:#e34948;
  --oa:#fff;--og:#fff;
}
@media(prefers-color-scheme:dark){:root{
  --s0:#1a1a17;--s1:#232320;--s2:#232320;
  --bd:#33322d;--bds:#403f38;--bda:#378add;
  --ba:#0c2a44;
  --tp:#f1f0e9;--ts:#c7c4b8;--tm:#83806f;
  --ta:#6cb0ef;--tg:#4fd39a;--td:#f0837f;--tw:#f0aa5c;
  --fa:#378add;--fg:#1baf7a;--fr:#e34948;
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--s0);font-family:var(--fn);color:var(--tp)}
#aw{max-width:740px;margin:0 auto;min-height:100vh;background:var(--s0);padding-bottom:120px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.card{background:var(--s2);border:.5px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.metric{background:var(--s1);border-radius:var(--r);padding:12px 14px}
.nb{padding:6px 14px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--fn);transition:background .15s}
.pb{padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:.5px solid var(--bds);background:transparent;color:var(--ts);font-family:var(--fn)}
.pb.on{border-color:var(--bda);background:var(--ba);color:var(--ta)}
input,select,textarea{font-family:var(--fn);font-size:14px;color:var(--tp);background:var(--s1);border:.5px solid var(--bds);border-radius:var(--r);padding:9px 11px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--bda);box-shadow:0 0 0 2px var(--ba)}
textarea{resize:vertical}
.fl{display:block;font-size:12px;font-weight:500;color:var(--ts);margin-bottom:6px;margin-top:2px}
.sbtn{width:100%;margin-top:8px;padding:12px;background:var(--fa);color:var(--oa);border:none;border-radius:var(--r);font-weight:500;font-size:14px;cursor:pointer;font-family:var(--fn)}
.sbtn.ok{background:var(--fg)}
.ibtn{padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;border:.5px solid var(--bd);background:transparent;color:var(--ts);font-family:var(--fn);display:inline-flex;align-items:center;gap:4px}
.ibtn:hover{background:var(--s0)}
.ibtn.del{color:var(--td);border-color:var(--td)}
.ibtn.pri{color:var(--ta);border-color:var(--bda)}

/* Toast */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1b17;color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
#toast.show{opacity:1}

/* Timer — big & draggable */
#tmr{position:fixed;bottom:24px;right:16px;z-index:999;background:var(--s2);border:.5px solid var(--bd);border-radius:18px;padding:14px 18px;box-shadow:0 6px 28px rgba(0,0,0,.18);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:move;user-select:none;min-width:200px}
#tmr-grip{font-size:11px;color:var(--tm);letter-spacing:.05em;align-self:flex-start}
#tmr-disp{font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--tp);line-height:1;letter-spacing:-1px}
#tmr-disp.run{color:var(--ta)}
.tbtn{padding:6px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;border:none;font-family:var(--fn)}
.tbtn.go{background:var(--fa);color:#fff}
.tbtn.st{background:var(--fr);color:#fff}
.tbtn.use{background:var(--fg);color:#fff;display:none}
.tbtn.rst{background:transparent;border:.5px solid var(--bd);color:var(--tm);display:none}
#tmr-row{display:flex;gap:6px}

/* Heatmap */
.hc{width:13px;height:13px;border-radius:2px}

/* Syllabus */
.sec-hdr{padding:8px 12px;background:var(--s1);border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;color:var(--ts);display:flex;justify-content:space-between;align-items:center;border:.5px solid var(--bd);margin-bottom:4px}
.sec-hdr:hover{border-color:var(--bda)}
.sec-body{padding:4px 0 6px 0;margin-bottom:8px}
.ti{display:flex;align-items:flex-start;gap:6px;padding:3px 0;cursor:pointer;border-radius:4px}
.ti:hover .tx{color:var(--ta)}
.ti input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--fa);cursor:pointer;width:14px;height:14px}
.tx{font-size:12.5px;color:var(--ts);line-height:1.5;flex:1}
.tx.done{text-decoration:line-through;color:var(--tg);opacity:.7}
.tdate{font-size:10px;color:var(--tg);white-space:nowrap;flex-shrink:0}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{padding:6px 2px;text-align:center;font-size:12px;border-radius:6px;cursor:pointer;background:var(--s1);border:.5px solid var(--bd);min-height:32px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px}
.cal-day:hover{border-color:var(--bda)}
.cal-day.sel{background:var(--ba);border-color:var(--bda);color:var(--ta);font-weight:600}
.cal-day.today{border-color:var(--fa);font-weight:600}
.cal-day.has{position:relative}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--fa)}
.cal-day.other{opacity:.35}
.cal-day.empty{background:transparent;border:none;cursor:default}

/* Material table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--tm);border-bottom:.5px solid var(--bd)}
td{padding:8px 10px;border-bottom:.5px solid var(--bd);vertical-align:top}
td:last-child{white-space:nowrap}

/* Session row */
.sr-row{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--r);padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div id="aw">
<h2 class="sr">2026 Philippine Bar Exam Study Tracker</h2>
<div id="toast"></div>
<div id="tmr">
  <div id="tmr-grip">⠿ DRAG</div>
  <div id="tmr-disp">00:00:00</div>
  <div id="tmr-row">
    <button class="tbtn go" id="tb-tog" onclick="timerToggle()">Start</button>
    <button class="tbtn use" id="tb-use" onclick="timerUse()">Use</button>
    <button class="tbtn rst" id="tb-rst" onclick="timerReset()">✕</button>
  </div>
</div>
<div id="root"></div>
</div>

// ── Storage helpers ──
async function stor_get(k){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}catch{return null;}}
async function stor_set(k,v){try{await window.storage.set(k,JSON.stringify(v));}catch{}}

async function loadAll(){
  const [ch,sess,tasks,mats,strk,sett,notes,docs]=await Promise.all([
    stor_get('bar26_checked'),stor_get('bar26_sess'),
    stor_get('bar26_tasks'),stor_get('bar26_mats'),
    stor_get('bar26_streak'),stor_get('bar26_sett'),
    stor_get('bar26_notes'),stor_get('bar26_docs'),
  ]);
  if(ch) S.checked=ch;
  if(sess) S.sessions=sess;
  if(tasks) S.tasks=tasks;
  if(mats) S.mats=mats;
  if(strk) S.streak=strk;
  if(sett) S.settings={...S.settings,...sett};
  if(notes) S.notes=notes;
  if(docs) S.docs=docs;
  render();
}

// ── Utilities ──
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmt(n){return parseFloat(n||0).toFixed(1);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function topicId(sk,si,ti){return `${sk}_${si}_${ti}`;}
function dateDisp(d){if(!d)return'';const p=d.split('-');return`${MONTHS[parseInt(p[1])-1]} ${parseInt(p[2])}`;}
function getSubjColor(k){return SUBJS.find(s=>s.k===k)?.c||'#888';}
function getSubjName(k){return SUBJS.find(s=>s.k===k)?.sh||k;}

// ── Derived stats ──
function derived(){
  const now=new Date();
  const exam=new Date(S.settings.examDate);
  const daysLeft=Math.max(0,Math.ceil((exam-now)/86400000));
  const today=todayStr();
  const todayHrs=S.sessions.filter(s=>s.date===today).reduce((a,s)=>a+(s.hours||0),0);
  const totalHrs=S.sessions.reduce((a,s)=>a+(s.hours||0),0);
  const subj=SUBJS.map(sub=>({
    ...sub,
    hrs:S.sessions.filter(s=>s.subj===sub.k).reduce((a,s)=>a+(s.hours||0),0),
    tgt:Math.round(sub.w*(S.settings.total||1000)),
    checked:Object.keys(S.checked).filter(id=>id.startsWith(sub.k+'_')).length,
    total:SYL[sub.k]?.sections.reduce((a,sec)=>a+sec.t.length,0)||0,
  }));
  return{daysLeft,todayHrs,totalHrs,subj,today};
}

function buildHeat(){
  const now=new Date(),today=todayStr();
  const start=new Date(now);
  start.setDate(now.getDate()-now.getDay()-77);
  const weeks=[];const cur=new Date(start);
  for(let w=0;w<12;w++){
    const week=[];
    for(let d=0;d<7;d++){
      const ds=cur.toISOString().split('T')[0];
      const hrs=S.sessions.filter(s=>s.date===ds).reduce((a,s)=>a+(s.hours||0),0);
      week.push({ds,hrs,future:cur>now,month:cur.getMonth(),day:cur.getDate()});
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(week);
  }
  return weeks;
}

function heatColor(hrs,future){
  const dark=window.matchMedia?.('(prefers-color-scheme:dark)').matches;
  if(future||hrs===0)return dark?'#2c2c2a':'#f1f0e9';
  if(hrs<3)return dark?'#0c447c':'#e6f1fb';
  if(hrs<6)return dark?'#185fa5':'#b5d4f4';
  if(hrs<9)return'#378add';
  return'#ba7517';
}

  const header=`<div style="padding:16px 20px 10px">
    <div style="font-size:11px;color:var(--tm);letter-spacing:.1em;text-transform:uppercase">2026 Philippine Bar</div>
    <div style="font-size:20px;font-weight:500">Study Tracker</div>
  </div>`;
  let body='';
  if(S.view==='dash') body=renderDash(d);
  else if(S.view==='log') body=renderLog(d);

  attachHandlers();
}

// ── Syllabus ──
function renderSyl(d){
  const sk=S.sylKey;
  const subData=SYL[sk];
  const sub=SUBJS.find(s=>s.k===sk);
  const totalTopics=subData?.sections.reduce((a,s)=>a+s.t.length,0)||0;
  const checkedCount=Object.keys(S.checked).filter(id=>id.startsWith(sk+'_')).length;
  const pct=totalTopics>0?Math.round((checkedCount/totalTopics)*100):0;

  let tabs=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px">
  ${SUBJS.map(s=>`<button class="pb${S.sylKey===s.k?' on':''}" onclick="setSylKey('${s.k}')">${s.sh}</button>`).join('')}
  </div>`;

  let overview=`<div class="card" style="padding:12px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px">
      <span style="font-weight:500">${sub?.n}</span>
      <span style="color:${pct===100?'var(--tg)':'var(--ts)'};font-weight:500">${checkedCount} / ${totalTopics} (${pct}%)</span>
    </div>
    <div style="background:var(--s0);border-radius:6px;height:7px;overflow:hidden">
      <div style="height:100%;border-radius:6px;background:${sub?.c||'var(--fa)'};width:${pct}%;transition:width .4s"></div>
    </div>
  </div>`;

  let sections='';
  subData?.sections.forEach((sec,si)=>{
    const secId=`${sk}_${si}`;
    const expanded=S.sylExp[secId]!==false; // default open
    const secChecked=sec.t.filter((_,ti)=>S.checked[topicId(sk,si,ti)]).length;
    const secPct=sec.t.length>0?Math.round((secChecked/sec.t.length)*100):0;
    sections+=`<div class="syl-sec">
    <div class="sec-hdr" onclick="toggleSec('${secId}')">
      <div style="display:flex;align-items:center;gap:8px">
        <span>${esc(sec.s)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span style="font-size:11px;color:${secPct===100?'var(--tg)':'var(--tm)'}">${secChecked}/${sec.t.length}</span>
        <i class="ti ti-chevron-${expanded?'up':'down'}" style="font-size:14px"></i>
      </div>
    </div>`;
    if(expanded){
      sections+=`<div class="sec-body">`;
      sec.t.forEach((topic,ti)=>{
        const tid=topicId(sk,si,ti);
        const chkDate=S.checked[tid];
        const indent=(topic.d-1)*14;
        sections+=`<div class="ti" style="padding-left:${indent}px" onclick="checkTopic('${tid}')">
          <input type="checkbox" ${chkDate?'checked':''} onchange="checkTopic('${tid}')" onclick="event.stopPropagation()">
          <span class="tx${chkDate?' done':''}">${esc(topic.x)}</span>
          ${chkDate?`<span class="tdate">${dateDisp(chkDate)}</span>`:''}
        </div>`;
      });
      sections+=`</div>`;
    }
    sections+=`</div>`;
  });

  return tabs+overview+`<div style="margin-top:4px">${sections}</div>`;
}

// ── Tasks ──
function getWeekDays(dateStr){
  const d=new Date(dateStr);
  const dow=d.getDay(); // 0=Sun
  const offset=dow===0?-6:1-dow; // shift to Monday
  const mon=new Date(d);
  mon.setDate(d.getDate()+offset);
  return Array.from({length:7},(_,i)=>{
    const c=new Date(mon);c.setDate(mon.getDate()+i);
    return c.toISOString().split('T')[0];
  });
}

function renderTasks(){
  const anchor=S.calDate||todayStr();
  const todayD=todayStr();
  const weekDays=getWeekDays(anchor);
  const DAY_NAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  // Mini calendar
  const calParts=anchor.split('-');
  const calYear=parseInt(calParts[0]);
  const calMonth=parseInt(calParts[1])-1;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const MINI_DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];

  let calCells=MINI_DAYS.map(d=>`<div style="text-align:center;font-size:10px;font-weight:600;color:var(--tm);padding:2px 0">${d}</div>`).join('');

  for(let day=1;day<=daysInMonth;day++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const inWeek=weekDays.includes(ds);
    const isToday=ds===todayD;
    const hasTasks=(S.tasks[ds]||[]).length>0;
    calCells+=`<div onclick="setCalDate('${ds}')" style="text-align:center;font-size:11px;padding:3px 1px;border-radius:5px;cursor:pointer;
      background:${inWeek?'var(--ba)':'transparent'};

      <div style="font-size:13px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <span style="color:${isToday?'var(--ta)':'var(--tp)'}">${dayLabel}</span>
        ${dayTasks.length>0?`<span style="font-size:10px;color:${doneCt===dayTasks.length?'var(--tg)':'var(--tm)'};font-weight:500">${doneCt}/${dayTasks.length}</span>`:''}
      </div>
      ${taskRows||'<div style="font-size:11px;color:var(--tm);padding:2px 0">No tasks</div>'}
      ${addRow}
    </div>`;
  });
  dayCols+=`</div>`;

  // Main weekly panel
  let main=`<div style="flex:1;min-width:0">${weekNav}${dayCols}</div>`;

  return`<div style="display:flex;gap:14px;align-items:flex-start">${sidebar}${main}</div>`;
}

function shiftMonth(dir){
  const p=S.calDate.split('-');
  const d=new Date(parseInt(p[0]),parseInt(p[1])-1+dir,1);
  S.calDate=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
  render();

async function checkTopic(tid){
  const was=S.checked[tid];
  if(was){delete S.checked[tid];}
  else{S.checked[tid]=todayStr();}
  await stor_set('bar26_checked',S.checked);
  render();
}

async function saveLog(){
  const h=parseFloat(S.logForm.hours);
  if(!h||h<=0){showToast('Enter valid hours');return;}
  const sess={id:Date.now().toString(),date:S.logForm.date,subj:S.logForm.subj,hours:h};
  S.sessions=[...S.sessions,sess];
  await stor_set('bar26_sess',S.sessions);
  // streak update
  const today=todayStr();
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yd=yest.toISOString().split('T')[0];
  const sk=S.streak;
  if(sk.last!==today){
    sk.cur=sk.last===yd?(sk.cur||0)+1:1;
    sk.lng=Math.max(sk.lng||0,sk.cur);
    sk.last=today;
    await stor_set('bar26_streak',sk);
  }
  S.logForm.hours='';
  S.logSaved=true;
  render();
  setTimeout(()=>{S.logSaved=false;},1500);
  showToast('Session logged!');
}

async function deleteSession(id){
  S.sessions=S.sessions.filter(s=>s.id!==id);
  await stor_set('bar26_sess',S.sessions);
  render();
}

// ── Timer ──
let timerSec=0,timerRun=false,timerIv=null;
function timerTick(){
  timerSec++;
  const h=Math.floor(timerSec/3600),m=Math.floor((timerSec%3600)/60),s=timerSec%60;
  const disp=document.getElementById('tmr-disp');
  if(disp) disp.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function timerToggle(){
  const tog=document.getElementById('tb-tog');
  const use=document.getElementById('tb-use');
  const rst=document.getElementById('tb-rst');
  const disp=document.getElementById('tmr-disp');
  if(!timerRun){
    timerRun=true;timerIv=setInterval(timerTick,1000);
    if(tog) tog.textContent='Pause',tog.classList.replace('go','st');
    if(use) use.style.display='none';
    if(rst) rst.style.display='none';
    if(disp) disp.classList.add('run');
  } else {
    timerRun=false;clearInterval(timerIv);
    if(tog) tog.textContent='Resume',tog.classList.replace('st','go');
    if(timerSec>0){if(use) use.style.display='';if(rst) rst.style.display='';}
    if(disp) disp.classList.remove('run');
  }
}
function timerUse(){
  const hrs=(timerSec/3600).toFixed(2);
  S.logForm.hours=parseFloat(hrs).toFixed(1);
  go('log');
  timerReset();
}
function timerReset(){
  timerRun=false;clearInterval(timerIv);timerSec=0;
  const disp=document.getElementById('tmr-disp');
  if(disp){disp.textContent='00:00:00';disp.classList.remove('run');}
  const tog=document.getElementById('tb-tog');
  const use=document.getElementById('tb-use');
  const rst=document.getElementById('tb-rst');
  if(tog){tog.textContent='Start';tog.classList.remove('st');tog.classList.add('go');}
  if(use) use.style.display='none';
  if(rst) rst.style.display='none';
}

// ── Draggable timer ──
(function(){
  let drag=false,ox=0,oy=0,el=null;
  document.addEventListener('mousedown',e=>{
    const tmr=document.getElementById('tmr');
    if(tmr&&tmr.contains(e.target)&&e.target.tagName!=='BUTTON'){
      drag=true;el=tmr;
      const rect=tmr.getBoundingClientRect();
      ox=e.clientX-rect.left;oy=e.clientY-rect.top;
      tmr.style.cursor='grabbing';e.preventDefault();
    }
  });
  document.addEventListener('mousemove',e=>{
    if(!drag||!el)return;
    const x=e.clientX-ox,y=e.clientY-oy;
    el.style.left=x+'px';el.style.top=y+'px';
    el.style.right='auto';el.style.bottom='auto';
  });
  document.addEventListener('mouseup',()=>{
    drag=false;
    const tmr=document.getElementById('tmr');
    if(tmr) tmr.style.cursor='move';
  });
  // Touch support
  document.addEventListener('touchstart',e=>{
    const tmr=document.getElementById('tmr');
    if(tmr&&tmr.contains(e.target)&&e.target.tagName!=='BUTTON'){
      drag=true;el=tmr;
      const rect=tmr.getBoundingClientRect();
      ox=e.touches[0].clientX-rect.left;oy=e.touches[0].clientY-rect.top;
    }
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!drag||!el)return;
    const x=e.touches[0].clientX-ox,y=e.touches[0].clientY-oy;
    el.style.left=x+'px';el.style.top=y+'px';
    el.style.right='auto';el.style.bottom='auto';
  },{passive:true});
  document.addEventListener('touchend',()=>{drag=false;});
})();
