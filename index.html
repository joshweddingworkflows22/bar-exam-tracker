<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Bar Exam Study Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/tabler-icons.min.css">
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-voice:var(--font-sans);
  --radius:8px;
  --surface-0:#f7f6f0;--surface-1:#fff;--surface-2:#fff;
  --border:#e5e3da;--border-strong:#d8d5c9;--border-accent:#2a78d6;
  --bg-accent:#e6f1fb;
  --text-primary:#1c1b17;--text-secondary:#55524a;--text-muted:#928e80;
  --text-accent:#1a5aa8;--text-success:#1a8f5e;--text-danger:#c23d3c;--text-warning:#a8620f;
  --fill-accent:#2a78d6;--fill-success:#1baf7a;--fill-danger:#e34948;
  --on-accent:#fff;--on-success:#fff;
}
@media(prefers-color-scheme:dark){
  :root{
    --surface-0:#1a1a17;--surface-1:#232320;--surface-2:#232320;
    --border:#33322d;--border-strong:#403f38;--border-accent:#378add;
    --bg-accent:#0c2a44;
    --text-primary:#f1f0e9;--text-secondary:#c7c4b8;--text-muted:#83806f;
    --text-accent:#6cb0ef;--text-success:#4fd39a;--text-danger:#f0837f;--text-warning:#f0aa5c;
    --fill-accent:#378add;--fill-success:#1baf7a;--fill-danger:#e34948;
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--surface-0);font-family:var(--font-sans)}
#app-wrap{max-width:720px;margin:0 auto;min-height:100vh;background:var(--surface-0)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.card{background:var(--surface-2);border:.5px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.metric{background:var(--surface-1);border-radius:var(--radius);padding:12px 14px}
.pill-btn{padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:.5px solid var(--border-strong);background:transparent;color:var(--text-secondary)}
.pill-btn.active{border-color:var(--border-accent);background:var(--bg-accent);color:var(--text-accent)}
.nav-btn{padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;transition:background .15s;font-family:var(--font-sans)}
.sess-row{background:var(--surface-1);border-radius:var(--radius);padding:12px 14px;border:.5px solid var(--border);margin-bottom:10px}
.field-label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;margin-top:2px}
input,select,textarea,datalist{font-family:var(--font-sans);font-size:14px;color:var(--text-primary);background:var(--surface-1);border:.5px solid var(--border-strong);border-radius:var(--radius);padding:9px 11px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--border-accent);box-shadow:0 0 0 2px var(--bg-accent)}
textarea{resize:vertical}
.save-btn{width:100%;margin-top:6px;padding:12px;background:var(--fill-accent);color:var(--on-accent);border:none;border-radius:var(--radius);font-weight:500;font-size:14px;cursor:pointer;font-family:var(--font-sans)}
.save-btn.ok{background:var(--fill-success)}
.icon-btn{padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;border:.5px solid var(--border);background:transparent;color:var(--text-secondary);font-family:var(--font-sans);display:inline-flex;align-items:center;gap:4px}
.icon-btn:hover{background:var(--surface-0)}
.icon-btn.danger{color:var(--text-danger);border-color:var(--text-danger)}
.icon-btn.primary{color:var(--text-accent);border-color:var(--border-accent)}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1c1b17;color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:12px;z-index:999;transition:opacity .3s;pointer-events:auto;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#toast.hidden{opacity:0;pointer-events:none}
#toast-undo{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:12px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font-sans)}
#toast-undo.hidden{display:none}

/* Floating timer */
#timer-float{position:fixed;bottom:20px;right:16px;z-index:998;background:var(--surface-2);border:.5px solid var(--border);border-radius:16px;padding:10px 14px;box-shadow:0 4px 20px rgba(0,0,0,.12);display:flex;align-items:center;gap:10px;font-family:var(--font-sans)}
#timer-display{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text-primary);min-width:72px}
#timer-display.running{color:var(--text-accent)}
.timer-btn{padding:5px 12px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;border:none;font-family:var(--font-sans)}
.timer-btn.start{background:var(--fill-accent);color:#fff}
.timer-btn.stop{background:#e34948;color:#fff}
.timer-btn.use{background:var(--fill-success);color:#fff}
.timer-btn.reset{background:transparent;border:.5px solid var(--border);color:var(--text-muted)}

/* Timeline bars */
.tl-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
.tl-bar-col{display:flex;flex-direction:column-reverse;height:80px;width:100%;border-radius:3px;overflow:hidden;background:var(--surface-0)}
.tl-bar-seg{width:100%;flex-shrink:0;transition:height .3s}
.tl-date-label{font-size:9px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}

/* Syllabus view */
.syl-section{margin-bottom:6px}
.syl-section-hdr{padding:8px 12px;background:var(--surface-1);border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-secondary);display:flex;justify-content:space-between;align-items:center;border:.5px solid var(--border)}
.syl-topics{padding:4px 0 4px 12px;border-left:2px solid var(--border-accent);margin-left:12px;margin-top:4px}
.syl-topic{padding:5px 8px;font-size:12px;color:var(--text-secondary);border-radius:4px;cursor:pointer;line-height:1.4}
.syl-topic:hover{background:var(--bg-accent);color:var(--text-accent)}
.syl-topic.checked{color:var(--text-success);text-decoration:line-through;opacity:.6}
</style>
</head>
<body>
<div id="app-wrap">
  <h2 class="sr-only">2026 Philippine Bar Exam Study Tracker</h2>
  <div id="toast" class="hidden">
    <span id="toast-msg"></span>
    <button id="toast-undo" class="hidden" onclick="undoAction()">Undo</button>
  </div>
  <div id="timer-float">
    <div id="timer-display">00:00</div>
    <button id="timer-toggle-btn" class="timer-btn start" onclick="toggleTimer()">Start</button>
    <button id="timer-use-btn" class="timer-btn use" onclick="useTimerTime()" style="display:none">Use time</button>
    <button id="timer-reset-btn" class="timer-btn reset" onclick="resetTimer()" style="display:none">✕</button>
  </div>
  <div id="root"></div>
</div>

let timer={running:false,startMs:0,elapsed:0,iv:null};

function toggleTimer(){
  if(timer.running){
    timer.elapsed+=Date.now()-timer.startMs;
    clearInterval(timer.iv);
    timer.running=false;
    document.getElementById("timer-toggle-btn").className="timer-btn start";
    document.getElementById("timer-toggle-btn").textContent="Start";
    document.getElementById("timer-use-btn").style.display="";
    document.getElementById("timer-reset-btn").style.display="";
    document.getElementById("timer-display").classList.remove("running");
  } else {
    timer.startMs=Date.now();
    timer.running=true;
    timer.iv=setInterval(tickTimer,1000);
    document.getElementById("timer-toggle-btn").className="timer-btn stop";
    document.getElementById("timer-toggle-btn").textContent="Stop";
    document.getElementById("timer-use-btn").style.display="none";
    document.getElementById("timer-reset-btn").style.display="none";
    document.getElementById("timer-display").classList.add("running");
  }
}
function tickTimer(){
  const total=Math.floor((timer.elapsed+(Date.now()-timer.startMs))/1000);
  const h=Math.floor(total/3600),m=Math.floor((total%3600)/60),s=total%60;
  const el=document.getElementById("timer-display");
  if(el) el.textContent=h>0?`${h}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;
}
function resetTimer(){
  clearInterval(timer.iv);
  timer={running:false,startMs:0,elapsed:0,iv:null};
  document.getElementById("timer-display").textContent="00:00";
  document.getElementById("timer-display").classList.remove("running");
  document.getElementById("timer-toggle-btn").className="timer-btn start";
  document.getElementById("timer-toggle-btn").textContent="Start";
  document.getElementById("timer-use-btn").style.display="none";
  document.getElementById("timer-reset-btn").style.display="none";
}
function useTimerTime(){
  const secs=Math.floor(timer.elapsed/1000);
  const hrs=Math.round((secs/3600)*4)/4; // round to nearest 0.25
  const hrsStr=hrs.toFixed(2).replace(/\.?0+$/,"");

function pad(n){return String(n).padStart(2,"0");}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimeout=null;
let pendingUndo=null;
function showToast(msg,undoFn){
  clearTimeout(toastTimeout);
  const t=document.getElementById("toast");
  const m=document.getElementById("toast-msg");
  const u=document.getElementById("toast-undo");
  m.textContent=msg;
  pendingUndo=undoFn||null;
  u.className=undoFn?"":"hidden";
  t.classList.remove("hidden");
  toastTimeout=setTimeout(()=>t.classList.add("hidden"),3500);
}
function undoAction(){
  if(pendingUndo){pendingUndo();pendingUndo=null;}
  document.getElementById("toast").classList.add("hidden");
}

// ── Storage (localStorage shim) ────────────────────────────────────────────
window.storage={
  async get(k){const v=localStorage.getItem(k);return v===null?null:{value:v};},
  async set(k,v){localStorage.setItem(k,v);return{value:v};},
  async delete(k){localStorage.removeItem(k);}
};

// ── Helpers ────────────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().split("T")[0];}
function fmt1(n){return parseFloat(n||0).toFixed(1);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function escHtml(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function isDark(){return window.matchMedia?.("(prefers-color-scheme:dark)").matches;}

// ── Syllabus helpers ───────────────────────────────────────────────────────
function getTopicsForSubject(subjectName){
  const key=SUBJECT_SYLLABUS_MAP[subjectName];
  if(!key||!SYLLABUS[key])return[];
  return SYLLABUS[key].flatMap(s=>s.topics);
}
function getSectionsForSubject(subjectName){
  const key=SUBJECT_SYLLABUS_MAP[subjectName];
  return SYLLABUS[key]||[];
}
function updateTopicDatalist(subjectName){
  const dl=document.getElementById("topic-datalist");
  if(!dl)return;
  const topics=getTopicsForSubject(subjectName);
  dl.innerHTML=topics.map(t=>`<option value="${escHtml(t)}">`).join("");
}

// ── Persistence ────────────────────────────────────────────────────────────
async function persist(){
  await window.storage.set("bar_v4_sessions",JSON.stringify(state.sessions));
  await window.storage.set("bar_v4_settings",JSON.stringify(state.settings));
  await window.storage.set("bar_v4_streak",JSON.stringify(state.streak));
  await window.storage.set("bar_v4_sylchecked",JSON.stringify(state.syllabusChecked));
}
async function load(){
  try{const r=await window.storage.get("bar_v4_sessions");if(r)state.sessions=JSON.parse(r.value);}catch{}
  try{const r=await window.storage.get("bar_v4_settings");if(r)state.settings={...state.settings,...JSON.parse(r.value)};}catch{}
  try{const r=await window.storage.get("bar_v4_streak");if(r)state.streak=JSON.parse(r.value);}catch{}
  try{const r=await window.storage.get("bar_v4_sylchecked");if(r)state.syllabusChecked=JSON.parse(r.value);}catch{}
  // Ensure all sessions have IDs (migrate old data)
  state.sessions=state.sessions.map(s=>s.id?s:{...s,id:uid()});
  state.loading=false;
  render();
}

// ── CRUD ───────────────────────────────────────────────────────────────────
async function saveSession(){
  const h=parseFloat(state.form.hours);
  if(!state.form.topic.trim()||!h||h<=0){
    showToast("Please enter a topic and hours.");
    return;
  }
  if(state.editId){
    // Update existing
    state.sessions=state.sessions.map(s=>
      s.id===state.editId?{...s,...state.form,hours:h,id:s.id}:s
    );
    state.editId=null;
    await persist();
    state.form={...state.form,topic:"",hours:"",studied:"",struggled:""};
    state.saved=true;render();
    showToast("Session updated");
    setTimeout(()=>{state.saved=false;state.view="history";render();},1200);
  } else {
    // Create new
    const session={id:uid(),...state.form,hours:h};
    state.sessions=[...state.sessions,session];
    const today=todayStr();
    const yest=new Date();yest.setDate(yest.getDate()-1);
    const yd=yest.toISOString().split("T")[0];
    const sk=state.streak;
    if(sk.lastDate!==today){
      sk.current=sk.lastDate===yd?(sk.current||0)+1:1;
      sk.longest=Math.max(sk.longest||0,sk.current);
      sk.lastDate=today;
    }
    await persist();
    state.saved=true;
    state.form={...state.form,topic:"",hours:"",studied:"",struggled:""};
    render();
    showToast("Session saved ✓");
    setTimeout(()=>{state.saved=false;state.view="dashboard";render();},1500);
  }
}

function editSession(id){
  const s=state.sessions.find(x=>x.id===id);
  if(!s)return;
  state.form={date:s.date,subject:s.subject,topic:s.topic,hours:s.hours,studied:s.studied||"",struggled:s.struggled||""};
  state.editId=id;
  state.view="log";
  render();
  setTimeout(()=>updateTopicDatalist(s.subject),50);
}

async function deleteSession(id){
  const deleted=state.sessions.find(s=>s.id===id);
  state.sessions=state.sessions.filter(s=>s.id!==id);
  await persist();
  render();
  showToast(`Session deleted`,()=>{
    state.sessions=[...state.sessions,deleted].sort((a,b)=>a.date.localeCompare(b.date));
    persist();render();
    showToast("Restored ✓");
  });
}

async function saveSettings(){
  await window.storage.set("bar_v4_settings",JSON.stringify(state.settings));
}

// ── Derived ────────────────────────────────────────────────────────────────
function derived(){
  const s=state;
  const today=todayStr();
  const daysLeft=Math.max(0,Math.ceil((new Date(s.settings.examDate)-new Date())/86400000));
  const todayHours=s.sessions.filter(x=>x.date===today).reduce((a,x)=>a+(x.hours||0),0);
  const totalHours=s.sessions.reduce((a,x)=>a+(x.hours||0),0);
  const uniqueDays=new Set(s.sessions.map(x=>x.date)).size;
  const avgHours=uniqueDays>0?totalHours/uniqueDays:0;
  const subjectStats=SUBJECTS.map(sub=>({
    ...sub,
    hours:s.sessions.filter(x=>x.subject===sub.name).reduce((a,x)=>a+(x.hours||0),0),
    target:Math.round(sub.weight*(s.settings.totalTarget||1000)),
  }));
  return{daysLeft,todayHours,totalHours,uniqueDays,avgHours,subjectStats};
}

// ── Heatmap ────────────────────────────────────────────────────────────────
function heatColor(hrs,future){
  const dark=isDark();
  if(future)return dark?"#2c2c2a":"#e1e0d9";
  if(hrs===0)return dark?"#2c2c2a":"#f1f0e9";
  if(hrs<3)return dark?"#0c447c":"#e6f1fb";
  if(hrs<6)return dark?"#185fa5":"#b5d4f4";
  if(hrs<9)return dark?"#378add":"#378add";
  return"#ba7517";
}
function buildHeatmap(sessions){
  const now=new Date();
  const start=new Date(now);
  start.setDate(now.getDate()-now.getDay()-77);
  const weeks=[];const cur=new Date(start);
  for(let w=0;w<12;w++){
    const week=[];
    for(let d=0;d<7;d++){
      const ds=cur.toISOString().split("T")[0];
      const hrs=sessions.filter(s=>s.date===ds).reduce((a,s)=>a+(s.hours||0),0);
      week.push({date:ds,hours:hrs,month:cur.getMonth(),day:cur.getDate(),future:cur>now});
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(week);
  }
  return weeks;
}

// ── Timeline view ──────────────────────────────────────────────────────────
function buildTimeline(sessions,days){
  const now=new Date();
  const result=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(now);d.setDate(now.getDate()-i);
    const ds=d.toISOString().split("T")[0];
    const daySessions=sessions.filter(s=>s.date===ds);
    const total=daySessions.reduce((a,s)=>a+(s.hours||0),0);
    const bySubject=SUBJECTS.map(sub=>({
      ...sub,
      hours:daySessions.filter(s=>s.subject===sub.name).reduce((a,s)=>a+(s.hours||0),0),
    }));
    result.push({date:ds,day:d.getDate(),month:d.getMonth(),weekday:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()],total,bySubject});
  }
  return result;
}

              ${day.total>0?fmt1(day.total):""}
            </div>
            <div class="tl-bar-col" style="border:${isToday?".5px solid var(--border-accent)":"none"}">
              ${day.bySubject.filter(sub=>sub.hours>0).map(sub=>`
              <div class="tl-bar-seg" title="${sub.name}: ${fmt1(sub.hours)}h"
                style="height:${Math.round((sub.hours/maxHours)*80)}px;background:${sub.color};opacity:.85"></div>`).join("")}
            </div>
            <div class="tl-date-label" style="color:${isToday?"var(--text-accent)":"var(--text-muted)"}">
              ${tl.length<=14?`${day.weekday}`:`${day.day}`}
            </div>
            ${tl.length<=14?`<div class="tl-date-label">${day.day}</div>`:""}
          </div>`;
        }).join("")}
      </div>
      <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px">
        ${SUBJECTS.map(sub=>`
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary)">
          <span style="width:9px;height:9px;border-radius:2px;background:${sub.color};display:inline-block"></span>${sub.short}
        </div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div style="font-weight:500;font-size:13px;margin-bottom:12px">Period summary</div>
      ${(()=>{
        const totalInRange=tl.reduce((a,d)=>a+d.total,0);
        const studyDays=tl.filter(d=>d.total>0).length;
        const avg=studyDays>0?totalInRange/studyDays:0;
        return`
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
          <div class="metric"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Total hours</div><div style="font-size:20px;font-weight:500">${fmt1(totalInRange)}</div></div>
          <div class="metric"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Study days</div><div style="font-size:20px;font-weight:500">${studyDays}</div></div>
          <div class="metric"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Avg/day</div><div style="font-size:20px;font-weight:500">${fmt1(avg)}</div></div>
        </div>`;
      })()}
    </div>`;
  }

  // ── SYLLABUS ───────────────────────────────────────────────────────────
  if(s.view==="syllabus"){
    const syllabusKey=SUBJECT_SYLLABUS_MAP[s.syllabusSubject];
    const sections=SYLLABUS[syllabusKey]||[];
    const totalTopics=sections.reduce((a,sec)=>a+sec.topics.length,0);
    const checkedCount=sections.reduce((a,sec)=>a+sec.topics.filter(t=>s.syllabusChecked[s.syllabusSubject+"::"+t]).length,0);
    html+=`
    <div class="card" style="padding-bottom:8px">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Official 2026 Bar Syllabus — tap topics to mark as reviewed</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
        ${SUBJECTS.map(sub=>`
        <button class="pill-btn${s.syllabusSubject===sub.name?" active":""}" onclick="setSyllabusSubject('${sub.name}')">${sub.short}</button>`).join("")}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted)">
        <span>${checkedCount} / ${totalTopics} reviewed</span>
        <div style="background:var(--surface-0);border-radius:6px;height:5px;width:120px;overflow:hidden;display:inline-block">
          <div style="height:100%;border-radius:6px;background:var(--fill-success);width:${pct(checkedCount,totalTopics)}%"></div>
        </div>
      </div>
    </div>
    <div>
      ${sections.map((sec,si)=>{
        const isOpen=s.syllabusOpenSections[s.syllabusSubject+"::"+si]!==false;
        const secChecked=sec.topics.filter(t=>s.syllabusChecked[s.syllabusSubject+"::"+t]).length;
        return`
        <div class="syl-section">
          <div class="syl-section-hdr" onclick="toggleSyllabusSection('${s.syllabusSubject}',${si})">
            <span>${sec.section} <span style="color:var(--text-muted);font-weight:400">(${secChecked}/${sec.topics.length})</span></span>
            <i class="ti ${isOpen?"ti-chevron-up":"ti-chevron-down"}"></i>
          </div>
          ${isOpen?`
          <div class="syl-topics">
            ${sec.topics.map(t=>{
              const ck=s.syllabusChecked[s.syllabusSubject+"::"+t];
              return`<div class="syl-topic${ck?" checked":""}" onclick="toggleSyllabusCheck('${s.syllabusSubject}','${escHtml(t).replace(/'/g,"&#39;")}')">${escHtml(t)}</div>`;
            }).join("")}
          </div>`:""}
        </div>`;
      }).join("")}
    </div>`;
  }

  // ── SETTINGS ───────────────────────────────────────────────────────────
  if(s.view==="settings"){
    html+=`
    <div style="max-width:460px">
      <div class="card">
        <div style="font-size:15px;font-weight:500;margin-bottom:18px">Settings</div>
        <label class="field-label">Bar exam date</label>
        <input type="date" value="${s.settings.examDate}" onchange="updateSetting('examDate',this.value)" style="margin-bottom:14px">
        <label class="field-label">Daily study target (hours)</label>
        <input type="number" value="${s.settings.dailyTarget}" oninput="updateSetting('dailyTarget',parseFloat(this.value)||10)" style="margin-bottom:14px">
        <label class="field-label">Total preparation hours target</label>
        <input type="number" value="${s.settings.totalTarget}" oninput="updateSetting('totalTarget',parseFloat(this.value)||1000)" style="margin-bottom:14px">
        <div style="padding:12px 14px;background:var(--surface-1);border-radius:var(--radius);font-size:12px;color:var(--text-muted);line-height:1.6">
          Subject targets are auto-calculated using official Bar weights: Remedial 25%, Civil Law 20%, Commercial 20%, Political Law 15%, Labor 10%, Criminal 10%.
        </div>
      </div>
      <div class="card">
        <div style="font-size:13px;font-weight:500;margin-bottom:12px">Data</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">${s.sessions.length} sessions logged · data stored in this browser</div>
        <button onclick="exportData()" class="icon-btn" style="font-size:13px;padding:8px 14px"><i class="ti ti-download"></i> Export sessions as JSON</button>
      </div>
    </div>`;
  }

  html+="</div></div>";
  el.innerHTML=html;
}

// ── Global handlers ────────────────────────────────────────────────────────
window.setState=function(k,v){state[k]=v;render();}
window.setForm=function(k,v){state.form={...state.form,[k]:v};}
window.setFilter=function(v){state.filter=v;render();}
window.setTlRange=function(v){state.tlRange=v;render();}
window.setSyllabusSubject=function(v){state.syllabusSubject=v;render();}
window.updateSetting=function(k,v){state.settings={...state.settings,[k]:v};saveSettings();}
window.toggleSyllabusSection=function(subj,si){
  const key=subj+"::"+si;
  state.syllabusOpenSections={...state.syllabusOpenSections,[key]:state.syllabusOpenSections[key]===false?true:false};
  render();
}
window.toggleSyllabusCheck=async function(subj,topic){
  const key=subj+"::"+topic;
  state.syllabusChecked={...state.syllabusChecked,[key]:!state.syllabusChecked[key]};
  await window.storage.set("bar_v4_sylchecked",JSON.stringify(state.syllabusChecked));
  render();
}
window.editSession=editSession;
window.deleteSession=deleteSession;
window.saveSession=saveSession;
window.undoAction=undoAction;
window.updateTopicDatalist=updateTopicDatalist;
window.exportData=function(){
  const blob=new Blob([JSON.stringify(state.sessions,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`bar-sessions-${todayStr()}.json`;a.click();
}

load();
</script>
</body>
</html>
